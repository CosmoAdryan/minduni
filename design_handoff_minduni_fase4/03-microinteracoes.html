<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MindUni — Fase 4 / Bloco 3: Microinterações</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Lora:ital,wght@1,400;1,500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --s50:#FAFAF8;--s100:#F4F2EE;--s200:#E6E2DB;--s300:#CEC9BF;
  --s400:#A29D95;--s500:#756F66;--s600:#5A544C;--s700:#3A3731;
  --s800:#282521;--s900:#1C1917;
  --g50:#EEF5F1;--g100:#D4E9DE;--g200:#A9D3BF;
  --g400:#5E9B84;--g500:#3D7A67;--g600:#2D6254;--g700:#1E4D41;
  --a50:#FEF8EC;--a100:#FCEECE;--a400:#D4973E;--a500:#B87A28;
  --cr:#C04A4A;--cr-l:#FDF2F2;--cr-b:#F5C6C6;
}
body{font-family:'Inter',-apple-system,sans-serif;background:var(--s100);color:var(--s900);font-size:14px;line-height:1.6}

.dh{background:var(--s900);color:#fff;padding:48px 0 36px}
.dh .in{max-width:1280px;margin:0 auto;padding:0 48px}
.phase-tag{display:inline-flex;align-items:center;gap:8px;background:var(--g700);color:var(--g100);font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:5px 14px;border-radius:99px;margin-bottom:14px}
.dh h1{font-size:30px;font-weight:800;letter-spacing:-.025em;margin-bottom:6px}
.dh p{font-size:13px;color:var(--s400)}

nav{background:#fff;border-bottom:1px solid var(--s200);position:sticky;top:0;z-index:200;overflow-x:auto}
nav .in{max-width:1280px;margin:0 auto;padding:0 48px;display:flex;white-space:nowrap}
nav a{display:block;padding:13px 16px;font-size:12px;font-weight:600;color:var(--s400);text-decoration:none;border-bottom:2px solid transparent}
nav a:hover{color:var(--g500);border-bottom-color:var(--g500)}

.page{max-width:1280px;margin:0 auto;padding:0 48px 120px}
.sec{padding:56px 0;border-bottom:1px solid var(--s200);scroll-margin-top:54px}
.sec:last-child{border-bottom:none}
.sec-num{font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--s400);margin-bottom:4px}
.sec-title{font-size:24px;font-weight:800;letter-spacing:-.02em;margin-bottom:6px}
.sec-sub{font-size:13px;color:var(--s500);margin-bottom:32px;max-width:600px}

/* demo stage */
.demo-stage{background:var(--s200);border-radius:20px;display:flex;align-items:center;justify-content:center;min-height:220px;padding:32px;position:relative;overflow:hidden}
.demo-stage-dark{background:var(--s900)}

/* spec table */
.spec-table{width:100%;border-collapse:collapse;font-size:12px;margin-top:14px}
.spec-table th{text-align:left;font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--s400);padding:8px 12px;border-bottom:2px solid var(--s200)}
.spec-table td{padding:10px 12px;border-bottom:1px solid var(--s100);color:var(--s700);vertical-align:top}
.spec-table td:first-child{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--g600);white-space:nowrap}
.spec-table tr:last-child td{border-bottom:none}

/* card */
.card{background:#fff;border:1px solid var(--s200);border-radius:16px;padding:24px}
.card-title{font-size:12px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--s400);margin-bottom:16px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:20px}
@media(max-width:900px){.grid-2,.grid-3{grid-template-columns:1fr}}

/* play button */
.play-btn{display:inline-flex;align-items:center;gap:7px;background:var(--g500);color:#fff;border:none;padding:9px 18px;border-radius:99px;font-size:12px;font-weight:700;font-family:'Inter';cursor:pointer;transition:background .15s}
.play-btn:hover{background:var(--g600)}
.play-btn-ghost{background:transparent;color:var(--s500);border:1.5px solid var(--s200)}
.play-btn-ghost:hover{background:var(--s100);color:var(--s700)}

/* timing label */
.t-label{display:inline-block;font-family:'JetBrains Mono',monospace;font-size:10px;background:var(--s900);color:#86EFAC;padding:2px 8px;border-radius:4px}
.e-label{display:inline-block;font-family:'JetBrains Mono',monospace;font-size:10px;background:var(--g50);color:var(--g600);padding:2px 8px;border-radius:4px;border:1px solid var(--g100)}

/* XP toast */
@keyframes toastIn{from{transform:translateY(-120%) scale(.94);opacity:0}to{transform:translateY(0) scale(1);opacity:1}}
@keyframes toastOut{from{transform:translateY(0) scale(1);opacity:1}to{transform:translateY(-120%) scale(.94);opacity:0}}
.toast-enter{animation:toastIn 320ms cubic-bezier(.34,1.56,.64,1) forwards}
.toast-exit{animation:toastOut 240ms cubic-bezier(.4,0,1,1) forwards}

/* breathing */
@keyframes breatheIn{0%{transform:scale(1);opacity:.6}100%{transform:scale(1.6);opacity:1}}
@keyframes breatheHold{0%,100%{transform:scale(1.6);opacity:1}}
@keyframes breatheOut{0%{transform:scale(1.6);opacity:1}100%{transform:scale(1);opacity:.6}}
@keyframes ringPulse{0%{box-shadow:0 0 0 0 rgba(61,122,103,.4)}70%{box-shadow:0 0 0 24px rgba(61,122,103,0)}100%{box-shadow:0 0 0 0 rgba(61,122,103,0)}}

/* mood tap */
@keyframes moodSelect{0%{transform:scale(1)}40%{transform:scale(.93)}70%{transform:scale(1.04)}100%{transform:scale(1)}}
.mood-tap{animation:moodSelect 280ms cubic-bezier(.34,1.56,.64,1)}

/* XP bar fill */
@keyframes xpFill{from{width:32%}to{width:62%}}

/* streak pop */
@keyframes streakPop{0%{transform:scale(0) rotate(-8deg);opacity:0}60%{transform:scale(1.1) rotate(2deg);opacity:1}100%{transform:scale(1) rotate(0deg);opacity:1}}

/* tab indicator slide */
@keyframes indicatorSlide{from{left:calc(20% * var(--from) + 50% - 9px)}to{left:calc(20% * var(--to) + 50% - 9px)}}

/* crisis slide up */
@keyframes sheetUp{from{transform:translateY(100%)}to{transform:translateY(0)}}

/* typing dots */
@keyframes typingBounce{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-5px);opacity:1}}

/* fade in */
@keyframes fadeUp{from{transform:translateY(8px);opacity:0}to{transform:translateY(0);opacity:1}}
</style>
</head>
<body>

<div class="dh">
  <div class="in">
    <div class="phase-tag">▸ Fase 4 · Bloco 3</div>
    <h1>Microinterações</h1>
    <p>7 animações · timing explícito · easing curve · notas Reanimated · demos ao vivo</p>
  </div>
</div>

<nav>
  <div class="in">
    <a href="#xp-toast">XP Toast</a>
    <a href="#breathing">Respiração 4-7-8</a>
    <a href="#mood">Mood Selector</a>
    <a href="#xpbar">XP Bar Fill</a>
    <a href="#streak">Streak Pop</a>
    <a href="#typing">Typing Indicator</a>
    <a href="#crisis-entry">Crisis Entry</a>
  </div>
</nav>

<div class="page" id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

const T = {
  s50:'#FAFAF8',s100:'#F4F2EE',s200:'#E6E2DB',s300:'#CEC9BF',
  s400:'#A29D95',s500:'#756F66',s600:'#5A544C',s700:'#3A3731',
  s800:'#282521',s900:'#1C1917',
  g50:'#EEF5F1',g100:'#D4E9DE',g200:'#A9D3BF',
  g400:'#5E9B84',g500:'#3D7A67',g600:'#2D6254',g700:'#1E4D41',
  a50:'#FEF8EC',a100:'#FCEECE',a400:'#D4973E',a500:'#B87A28',
  cr:'#C04A4A',crL:'#FDF2F2',crB:'#F5C6C6',
};

/* ── Spec table ── */
const SpecTable = ({ rows }) => (
  <table className="spec-table">
    <thead>
      <tr>
        <th>Propriedade</th>
        <th>Valor</th>
        <th>Notas</th>
      </tr>
    </thead>
    <tbody>
      {rows.map((r, i) => (
        <tr key={i}>
          <td>{r[0]}</td>
          <td><span className="t-label">{r[1]}</span></td>
          <td>{r[2]}</td>
        </tr>
      ))}
    </tbody>
  </table>
);

/* ── Reanimated note ── */
const RNote = ({ children }) => (
  <div style={{background:T.g50,border:('1px solid ' + (T.g100)),borderRadius:10,padding:'12px 14px',fontSize:12,color:T.g700,lineHeight:1.6,marginTop:14}}>
    <div style={{fontSize:10,fontWeight:700,letterSpacing:'.06em',textTransform:'uppercase',color:T.g500,marginBottom:4}}>Reanimated 3</div>
    {children}
  </div>
);

/* ══════════════════════════════════════════════════
   1. XP TOAST
══════════════════════════════════════════════════ */
const XPToast = () => {
  const [state, setState] = useState('idle'); // idle | enter | visible | exit
  const timerRef = useRef(null);

  const play = () => {
    if (state !== 'idle') return;
    setState('enter');
    timerRef.current = setTimeout(() => setState('visible'), 320);
    timerRef.current = setTimeout(() => setState('exit'), 2400);
    timerRef.current = setTimeout(() => setState('idle'), 2640);
  };

  const toastClass = state === 'enter' ? 'toast-enter'
    : state === 'exit' ? 'toast-exit'
    : '';

  return (
    <div id="xp-toast" className="sec">
      <div className="sec-num">Microinteração 01 / 07</div>
      <div className="sec-title">XP Toast</div>
      <div className="sec-sub">Aparece após completar uma prática ou sessão com o Sage. Discreto — não bloqueia nenhuma ação. Entrada com spring, saída com ease-in.</div>

      <div className="grid-2">
        <div>
          <div className="demo-stage" style={{flexDirection:'column',justifyContent:'flex-start',alignItems:'flex-end',padding:'16px 16px 32px',minHeight:160,background:T.s200,position:'relative',overflow:'hidden'}}>
            {/* Simulated status bar */}
            <div style={{position:'absolute',top:0,left:0,right:0,height:22,background:T.s300,borderRadius:'20px 20px 0 0'}}/>

            {/* Toast */}
            {state !== 'idle' && (
              <div className={toastClass} style={{
                position:'absolute',top:28,right:16,
                background:T.s900,borderRadius:12,padding:'10px 14px',
                display:'flex',alignItems:'center',gap:10,
                boxShadow:'0 4px 20px rgba(0,0,0,.25)',
                minWidth:180,
              }}>
                <div style={{width:32,height:32,borderRadius:9,background:T.a50,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke={T.a400} strokeWidth="1.8" strokeLinejoin="round"><path d="M12 2L15 9H22L16.5 13.5L18.5 20L12 16L5.5 20L7.5 13.5L2 9H9L12 2Z"/></svg>
                </div>
                <div>
                  <div style={{fontSize:12,fontWeight:700,color:'#fff'}}>+20 XP</div>
                  <div style={{fontSize:10,color:T.s400}}>Respiração 4-7-8 concluída</div>
                </div>
              </div>
            )}

            {/* Phone content placeholder */}
            <div style={{position:'absolute',bottom:20,left:20,right:20,height:60,background:T.s300,borderRadius:12,opacity:.5}}/>
          </div>

          <div style={{marginTop:14,display:'flex',gap:10,alignItems:'center'}}>
            <button className="play-btn" onClick={play} disabled={state!=='idle'} style={{opacity:state!=='idle'?.5:1}}>
              <svg width="12" height="12" viewBox="0 0 24 24" fill="white"><polygon points="5 3 19 12 5 21 5 3"/></svg>
              Reproduzir
            </button>
            <span style={{fontSize:11,color:T.s400}}>duração total: 2.64s</span>
          </div>
        </div>

        <div>
          <div className="card">
            <div className="card-title">Especificação de timing</div>
            <SpecTable rows={[
              ['entrada.duration','320ms','Spring — aparece rápido, sem bounce excessivo'],
              ['entrada.easing','cubic-bezier(.34,1.56,.64,1)','Spring suave — overshoot de ~6% em scale'],
              ['entrada.from','translateY(-120%) scale(.94)','Vem de cima, levemente menor'],
              ['visível.delay','0ms','Aparece assim que prática é confirmada'],
              ['visível.duration','2080ms','Tempo suficiente para ler, sem ocupar a tela'],
              ['saída.duration','240ms','Mais rápido que a entrada — urgência de sair'],
              ['saída.easing','cubic-bezier(.4,0,1,1)','ease-in — suave no início, rápido no fim'],
              ['saída.to','translateY(-120%) scale(.94)','Sai pelo mesmo caminho que entrou'],
              ['haptic','LIGHT impact','Haptics.impactAsync(ImpactFeedbackStyle.Light)'],
            ]}/>
          </div>
          <RNote>
            withSpring(0, &#123; damping: 14, stiffness: 180 &#125;) para Y. withTiming para opacity com Easing.out(Easing.ease). Usar runOnJS para dispatch do estado após animação de saída.
          </RNote>
        </div>
      </div>
    </div>
  );
};

/* ══════════════════════════════════════════════════
   2. BREATHING 4-7-8
══════════════════════════════════════════════════ */
const Breathing = () => {
  const [phase, setPhase] = useState('idle'); // idle | inhale | hold | exhale
  const [count, setCount] = useState(0);
  const [cycles, setCycles] = useState(0);
  const phaseRef = useRef('idle');
  const timerRef = useRef(null);

  const PHASES = [
    { id: 'inhale', label: 'Inspire', duration: 4000, color: T.g500 },
    { id: 'hold',   label: 'Segure',  duration: 7000, color: T.g600 },
    { id: 'exhale', label: 'Expire',  duration: 8000, color: T.g400 },
  ];

  const stop = () => {
    clearTimeout(timerRef.current);
    clearInterval(timerRef.current);
    setPhase('idle');
    setCount(0);
    phaseRef.current = 'idle';
  };

  const runPhase = (idx, cycleN) => {
    const p = PHASES[idx];
    setPhase(p.id);
    setCount(p.duration / 1000);
    phaseRef.current = p.id;

    let elapsed = p.duration / 1000;
    const interval = setInterval(() => {
      elapsed -= 1;
      setCount(elapsed);
      if (elapsed <= 0) clearInterval(interval);
    }, 1000);

    timerRef.current = setTimeout(() => {
      clearInterval(interval);
      const nextIdx = (idx + 1) % 3;
      const newCycle = nextIdx === 0 ? cycleN + 1 : cycleN;
      if (newCycle >= 3) { stop(); setCycles(0); return; }
      setCycles(newCycle);
      runPhase(nextIdx, newCycle);
    }, p.duration);
  };

  const start = () => {
    if (phase !== 'idle') { stop(); return; }
    setCycles(0);
    runPhase(0, 0);
  };

  useEffect(() => () => { clearTimeout(timerRef.current); }, []);

  const currentPhase = PHASES.find(p => p.id === phase);
  const isActive = phase !== 'idle';

  const circleAnim = isActive ? {
    inhale:  { animation: `breatheIn ${PHASES[0].duration + "ms"} ease-in-out forwards` },
    hold:    { transform: 'scale(1.6)', opacity: 1 },
    exhale:  { animation: `breatheOut ${PHASES[2].duration + "ms"} ease-in-out forwards` },
  }[phase] : {};

  return (
    <div id="breathing" className="sec">
      <div className="sec-num">Microinteração 02 / 07</div>
      <div className="sec-title">Ciclo de Respiração 4-7-8</div>
      <div className="sec-sub">Coração da prática mais importante do app. O círculo escala com a respiração. Contagem regressiva silenciosa. 3 ciclos = ~5 minutos.</div>

      <div className="grid-2">
        <div>
          <div className="demo-stage demo-stage-dark" style={{minHeight:300,flexDirection:'column',gap:20}}>
            {/* Outer ring */}
            <div style={{position:'relative',width:160,height:160,display:'flex',alignItems:'center',justifyContent:'center'}}>
              {/* Track ring */}
              <div style={{position:'absolute',inset:0,borderRadius:99,border:('1.5px solid ' + (T.g700)),opacity:.4}}/>
              {/* Animated circle */}
              <div style={{
                width:80,height:80,borderRadius:99,
                background: isActive ? (currentPhase?.color || T.g500) : T.g700,
                display:'flex',alignItems:'center',justifyContent:'center',
                transition: phase === 'hold' ? 'none' : 'background 600ms ease',
                boxShadow: isActive ? `0 0 0 0 ${T.g500}` : 'none',
                animation: phase === 'hold' ? 'ringPulse 2s ease-out infinite' : 'none',
                ...circleAnim,
              }}>
                <div style={{textAlign:'center'}}>
                  {isActive && <div style={{fontSize:28,fontWeight:800,color:'#fff',lineHeight:1}}>{count}</div>}
                  {!isActive && <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,.4)" strokeWidth="1.5" strokeLinecap="round"><circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/></svg>}
                </div>
              </div>
            </div>

            {/* Phase label */}
            <div style={{textAlign:'center'}}>
              <div style={{fontSize:20,fontWeight:800,color:'#fff',letterSpacing:'-.01em',minHeight:28}}>
                {isActive ? currentPhase?.label : 'Respiração 4-7-8'}
              </div>
              <div style={{fontSize:12,color:T.s500,marginTop:4}}>
                {isActive ? `Ciclo ${cycles + 1} de 3` : 'Inspire · Segure · Expire'}
              </div>
            </div>

            <button className="play-btn" onClick={start} style={{background: isActive ? T.cr : T.g500}}>
              {isActive ? 'Parar' : 'Iniciar exercício'}
            </button>
          </div>

          {/* Phase timeline */}
          <div style={{marginTop:16,background:'#fff',borderRadius:14,padding:'16px',border:('1px solid ' + (T.s200))}}>
            <div style={{fontSize:11,fontWeight:700,color:T.s400,letterSpacing:'.06em',textTransform:'uppercase',marginBottom:12}}>Linha do tempo — 1 ciclo (19s)</div>
            <div style={{display:'flex',gap:2,borderRadius:8,overflow:'hidden',height:10}}>
              <div style={{width:(4/19*100 + '%'),background:T.g500,title:'Inspire 4s'}}/>
              <div style={{width:(7/19*100 + '%'),background:T.g600,title:'Segure 7s'}}/>
              <div style={{width:(8/19*100 + '%'),background:T.g400,title:'Expire 8s'}}/>
            </div>
            <div style={{display:'flex',marginTop:6,fontSize:10,color:T.s400}}>
              <span style={{width:(4/19*100 + '%'),color:T.g500,fontWeight:700}}>4s inspire</span>
              <span style={{width:(7/19*100 + '%'),color:T.g600,fontWeight:700}}>7s segure</span>
              <span style={{width:(8/19*100 + '%'),color:T.g400,fontWeight:700}}>8s expire</span>
            </div>
          </div>
        </div>

        <div>
          <div className="card">
            <div className="card-title">Especificação de animação</div>
            <SpecTable rows={[
              ['inspire.scale','1.0 → 1.6','Cresce 60% durante 4s'],
              ['inspire.easing','ease-in-out','Suave no início e no fim — imita respiração real'],
              ['inspire.color',T.g500,'Sage-500 — presença sem alarme'],
              ['hold.effect','ringPulse 2s infinite','Ring radial pulsa suavemente durante 7s de hold'],
              ['hold.scale','1.6 (fixo)','Nenhum movimento — calma visual'],
              ['hold.color',T.g600,'Sage-600 — mais denso, mais concentrado'],
              ['exhale.scale','1.6 → 1.0','Volta ao tamanho original durante 8s'],
              ['exhale.easing','ease-in-out','Espelha o inspire'],
              ['exhale.color',T.g400,'Sage-400 — mais leve, liberação'],
              ['counter.style','tabular-nums','Evita layout shift na contagem regressiva'],
              ['haptic (inspire)','MEDIUM impact','Marcação do início de cada ciclo'],
              ['haptic (exhale fim)','LIGHT impact','Feedback suave ao completar ciclo'],
            ]}/>
          </div>
          <RNote>
            useSharedValue para scale e opacity. withTiming(1.6, &#123; duration: 4000, easing: Easing.inOut(Easing.ease) &#125;) para inspire. Animated.loop não usar — controle manual via fases. Vibração: Haptics.impactAsync apenas no início de cada ciclo.
          </RNote>
        </div>
      </div>
    </div>
  );
};

/* ══════════════════════════════════════════════════
   3. MOOD SELECTOR
══════════════════════════════════════════════════ */
const MoodSelector = () => {
  const [selected, setSelected] = useState(null);
  const [animated, setAnimated] = useState(null);

  const moods = [
    {v:1, e:'😢', l:'Muito mal', c:'#3B6FAB'},
    {v:2, e:'😔', l:'Mal',      c:'#6B8FAB'},
    {v:3, e:'😐', l:'Neutro',   c:'#888787'},
    {v:4, e:'😊', l:'Bem',      c:'#5E9B84'},
    {v:5, e:'😄', l:'Ótimo',    c:'#C9963A'},
  ];

  const pick = (v) => {
    setSelected(v);
    setAnimated(v);
    setTimeout(() => setAnimated(null), 300);
  };

  return (
    <div id="mood" className="sec">
      <div className="sec-num">Microinteração 03 / 07</div>
      <div className="sec-title">Mood Selector</div>
      <div className="sec-sub">Tap com spring bounce. Border e background mudam para a cor semântica do humor. Check aparece com fade-in. Nenhum scroll, nenhuma navegação — seleção inline.</div>

      <div className="grid-2">
        <div>
          <div className="demo-stage" style={{background:T.s100,flexDirection:'column',gap:8,padding:'28px 24px'}}>

                    {checked && <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="3" strokeLinecap="round"><path d="M20 6L9 17l-5-5"/></svg>}
                  </div>
                  <div style={{fontSize:11,color:T.s600,lineHeight:1.5}}>Estou ciente do CVV (188) e sei que posso ligar quando precisar.</div>
                </div>

                <div onClick={checked ? reset : undefined} style={{
                  borderRadius:11,padding:'13px',textAlign:'center',
                  fontSize:13,fontWeight:700,
                  background: checked ? T.g500 : 'transparent',
                  color: checked ? '#fff' : T.s400,
                  border: checked ? 'none' : ('1.5px solid ' + (T.s200)),
                  cursor: checked ? 'pointer' : 'not-allowed',
                  transition:'all 300ms cubic-bezier(.4,0,.2,1)',
                  opacity: checked ? 1 : 0.5,
                }}>Continuar com o Sage</div>
              </div>
            )}

            {/* Trigger button */}
            {state === 'idle' && (
              <div style={{position:'absolute',bottom:20,left:0,right:0,display:'flex',justifyContent:'center'}}>
                <button className="play-btn" onClick={trigger}>
                  <svg width="12" height="12" viewBox="0 0 24 24" fill="white"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                  Acionar modal
                </button>
              </div>
            )}
          </div>
          <div style={{marginTop:10,fontSize:11,color:T.s400}}>Marque o checkbox para habilitar "Continuar"</div>
        </div>

        <div>
          <div className="card">
            <div className="card-title">Especificação de timing</div>
            <SpecTable rows={[
              ['backdrop.duration','300ms','Fade simultâneo ao sheet — não precede'],
              ['backdrop.easing','ease','Suave — não quer assustar'],
              ['sheet.duration','380ms','Spring — sobe com energia, desacelera no fim'],
              ['sheet.easing','cubic-bezier(.34,1.2,.64,1)','Menos overshoot que o toast — contexto sério'],
              ['sheet.from','translateY(100%)','Vem de baixo da tela'],
              ['handle.visible','Sempre','Indica que é um sheet — affordance de scroll'],
              ['checkbox.animation','moodSelect 280ms spring','Micro-bounce ao marcar'],
              ['cta.transition','300ms ease','Border→Fill quando checkbox ativado'],
              ['cta.haptic (marcar)','SUCCESS','Haptics.notificationAsync(SUCCESS) ao marcar checkbox'],
              ['dismiss (após CTA)','slide down 280ms','Sheet desce, backdrop faz fade-out'],
              ['dismiss via swipe','Bloqueado','Não pode ser dispensado acidentalmente'],
            ]}/>
          </div>
          <RNote>
            Sheet: useSharedValue(screenHeight). withSpring(0, &#123; damping: 18, stiffness: 180 &#125;) na entrada. Backdrop: withTiming(0.72, &#123; duration: 300 &#125;) em opacity. Checkbox: withSpring via scale. CTA: interpolateColor de stone-200 para sage-500 baseado em isChecked SharedValue.
          </RNote>
        </div>
      </div>
    </div>
  );
};

/* ── App ── */
function App() {
  return (
    <div>
      <XPToast />
      <Breathing />
      <MoodSelector />
      <XPBarFill />
      <StreakPop />
      <TypingIndicator />
      <CrisisEntry />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
