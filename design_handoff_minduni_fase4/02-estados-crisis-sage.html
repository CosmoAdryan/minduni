<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MindUni — Fase 4 / Bloco 2</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Lora:ital,wght@1,400;1,500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --s50:#FAFAF8;--s100:#F4F2EE;--s200:#E6E2DB;--s300:#CEC9BF;
  --s400:#A29D95;--s500:#756F66;--s600:#5A544C;--s700:#3A3731;
  --s800:#282521;--s900:#1C1917;
  --g50:#EEF5F1;--g100:#D4E9DE;--g200:#A9D3BF;
  --g400:#5E9B84;--g500:#3D7A67;--g600:#2D6254;--g700:#1E4D41;
  --a50:#FEF8EC;--a100:#FCEECE;--a400:#D4973E;--a500:#B87A28;
  --cr:#C04A4A;--cr-l:#FDF2F2;--cr-b:#F5C6C6;
  --dk:#131210;--dk-s:#1D1B17;--dk-b:#2C2922;
}
body{font-family:'Inter',-apple-system,sans-serif;background:var(--s100);color:var(--s900);font-size:14px;line-height:1.6}

/* header */
.dh{background:var(--s900);color:#fff;padding:48px 0 36px}
.dh .in{max-width:1280px;margin:0 auto;padding:0 48px}
.phase-tag{display:inline-flex;align-items:center;gap:8px;background:var(--g700);color:var(--g100);font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:5px 14px;border-radius:99px;margin-bottom:14px}
.dh h1{font-size:30px;font-weight:800;letter-spacing:-.025em;margin-bottom:6px}
.dh p{font-size:13px;color:var(--s400)}

/* nav */
nav{background:#fff;border-bottom:1px solid var(--s200);position:sticky;top:0;z-index:200;overflow-x:auto}
nav .in{max-width:1280px;margin:0 auto;padding:0 48px;display:flex;white-space:nowrap}
nav a{display:block;padding:13px 16px;font-size:12px;font-weight:600;color:var(--s400);text-decoration:none;border-bottom:2px solid transparent}
nav a:hover,nav a.act{color:var(--g500);border-bottom-color:var(--g500)}

/* page */
.page{max-width:1280px;margin:0 auto;padding:0 48px 120px}

/* section */
.sec{padding:56px 0;border-bottom:1px solid var(--s200);scroll-margin-top:54px}
.sec:last-child{border-bottom:none}
.sec-num{font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--s400);margin-bottom:4px}
.sec-title{font-size:24px;font-weight:800;letter-spacing:-.02em;margin-bottom:4px}
.sec-sub{font-size:13px;color:var(--s500);margin-bottom:32px;max-width:600px}

/* phone */
.phone{width:280px;background:var(--s50);border-radius:44px;border:8px solid var(--s900);overflow:hidden;position:relative;box-shadow:0 24px 64px rgba(0,0,0,.2);flex-shrink:0}
.notch{width:72px;height:22px;background:var(--s900);border-radius:0 0 14px 14px;position:absolute;top:0;left:50%;transform:translateX(-50%);z-index:5}
.ph-label{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--s400);text-align:center;margin-top:10px}

/* grid helpers */
.g3{display:grid;grid-template-columns:repeat(3,auto);gap:28px;align-items:start;justify-content:start}
.g2{display:grid;grid-template-columns:auto auto;gap:28px;align-items:start;justify-content:start}
@media(max-width:960px){.g3,.g2{grid-template-columns:auto}}

/* skeleton shimmer */
@keyframes shimmer{0%{background-position:-400px 0}100%{background-position:400px 0}}
.sk{border-radius:6px;background:linear-gradient(90deg,var(--s200) 25%,var(--s100) 50%,var(--s200) 75%);background-size:800px 100%;animation:shimmer 1.4s infinite linear}

/* crisis modal overlay */
.overlay{position:absolute;inset:0;background:rgba(28,25,23,.72);z-index:10;display:flex;align-items:flex-end;padding-bottom:0}

/* sage tone badge */
.tone-badge{display:inline-flex;align-items:center;gap:5px;font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:3px 10px;border-radius:99px}

/* note box */
.note{background:#fff;border:1px solid var(--s200);border-radius:12px;padding:16px 18px;font-size:12px;color:var(--s600);line-height:1.6}
.note strong{color:var(--s900);display:block;margin-bottom:4px;font-size:11px;letter-spacing:.04em;text-transform:uppercase}
.note-g{border-left:3px solid var(--g500);background:var(--g50);color:var(--g700)}
.note-a{border-left:3px solid var(--a400);background:var(--a50);color:var(--s700)}
.note-r{border-left:3px solid var(--cr);background:var(--cr-l);color:#7F1D1D}
</style>
</head>
<body>

<div class="dh">
  <div class="in">
    <div class="phase-tag">▸ Fase 4 · Bloco 2</div>
    <h1>Estados + CrisisModal + Voz do Sage</h1>
    <p>Estados vazios · Loading skeletons · Erros · CrisisModal (3 momentos) · 5 tons de fala do Sage</p>
  </div>
</div>

<nav>
  <div class="in">
    <a href="#estados" class="act">Estados</a>
    <a href="#crisis">CrisisModal</a>
    <a href="#sage">Voz do Sage</a>
  </div>
</nav>

<div class="page" id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

const T = {
  s50:'#FAFAF8',s100:'#F4F2EE',s200:'#E6E2DB',s300:'#CEC9BF',
  s400:'#A29D95',s500:'#756F66',s600:'#5A544C',s700:'#3A3731',
  s800:'#282521',s900:'#1C1917',
  g50:'#EEF5F1',g100:'#D4E9DE',g200:'#A9D3BF',
  g400:'#5E9B84',g500:'#3D7A67',g600:'#2D6254',g700:'#1E4D41',
  a50:'#FEF8EC',a100:'#FCEECE',a400:'#D4973E',a500:'#B87A28',
  cr:'#C04A4A',crL:'#FDF2F2',crB:'#F5C6C6',
  dk:'#131210',dks:'#1D1B17',dkb:'#2C2922',
};

/* ── phone shell ── */
const Phone = ({ children, style = {} }) => (
  <div className="phone" style={style}>
    <div className="notch" />
    {children}
  </div>
);

/* ── tab bar ── */
const TabBar = ({ active = 'home' }) => {
  const tabs = [
    { id:'home', label:'Início', d:'M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z' },
    { id:'chat', label:'Sage', d:'M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z' },
    { id:'practice', label:'Práticas', path2:true },
    { id:'journal', label:'Diário', path3:true },
    { id:'profile', label:'Jornada', path4:true },
  ];
  return (
    <div style={{background:'#fff',borderTop:`1px solid ${T.s200}`,display:'flex',padding:'10px 0 16px'}}>
      {tabs.map(t => {
        const on = t.id === active;
        const col = on ? T.g500 : T.s400;
        return (
          <div key={t.id} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:3,position:'relative'}}>
            {on && <div style={{position:'absolute',top:-10,width:18,height:3,background:T.g500,borderRadius:'0 0 3px 3px'}} />}
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke={col} strokeWidth="1.8" strokeLinecap="round">
              {t.d && <path d={t.d}/>}
              {t.path2 && <><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2" strokeLinecap="round"/></>}
              {t.path3 && <><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></>}
              {t.path4 && <><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></>}
            </svg>
            <div style={{fontSize:9,fontWeight:on?700:600,color:col}}>{t.label}</div>
          </div>
        );
      })}
    </div>
  );
};

/* ── skeleton block ── */
const Sk = ({ w = '100%', h = 14, r = 6, style = {} }) => (
  <div className="sk" style={{ width: w, height: h, borderRadius: r, flexShrink: 0, ...style }} />
);

/* ── CVV line ── */
const CVVLine = () => (
  <div style={{display:'flex',alignItems:'center',gap:5,justifyContent:'center',color:T.s400}}>
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke={T.s400} strokeWidth="1.8" strokeLinecap="round"><path d="M6.6 10.8c1.4 2.8 3.8 5.1 6.6 6.6l2.2-2.2c.3-.3.7-.4 1-.2 1.1.4 2.3.6 3.6.6.6 0 1 .4 1 1V20c0 .6-.4 1-1 1-9.4 0-17-7.6-17-17 0-.6.4-1 1-1h3.5c.6 0 1 .4 1 1 0 1.3.2 2.5.6 3.6.1.3 0 .7-.2 1L6.6 10.8z"/></svg>
    <span style={{fontSize:10,fontWeight:600}}>CVV 188 · gratuito · 24h</span>
  </div>
);

/* ────────────────────────────────────────────────────────────
   SECTION 1 — ESTADOS
──────────────────────────────────────────────────────────── */

/* Dashboard states */
const DashboardStates = () => (
  <div>
    <div className="sec-num">Seção 1.1</div>
    <div className="sec-title">Dashboard — estados</div>
    <div className="sec-sub">Loading skeleton · Empty (primeiro acesso) · Erro de conexão com fallback local.</div>
    <div className="g3">

      {/* LOADING */}
      <div>
        <Phone>
          <div style={{background:T.s50,minHeight:520}}>
            <div style={{padding:'34px 18px 16px',display:'flex',flexDirection:'column',gap:14}}>
              <div>
                <Sk w="80px" h={10} style={{marginBottom:6}}/>
                <Sk w="140px" h={22}/>
              </div>
              {/* XP skeleton */}
              <div style={{background:'#fff',borderRadius:18,padding:'15px 16px',border:`1px solid ${T.s200}`,display:'flex',flexDirection:'column',gap:10}}>
                <div style={{display:'flex',gap:10,alignItems:'center'}}>
                  <Sk w={34} h={34} r={10}/>
                  <div style={{flex:1,display:'flex',flexDirection:'column',gap:6}}>
                    <Sk w="80%" h={12}/>
                    <Sk w="50%" h={10}/>
                  </div>
                </div>
                <Sk w="100%" h={4} r={99}/>
              </div>
              {/* streak skeleton */}
              <div style={{background:'#fff',borderRadius:14,padding:'12px 14px',border:`1px solid ${T.s200}`,display:'flex',gap:10,alignItems:'center'}}>
                <Sk w={32} h={32} r={10}/>
                <div style={{flex:1,display:'flex',flexDirection:'column',gap:6}}>
                  <Sk w="60%" h={11}/>
                  <Sk w="40%" h={9}/>
                </div>
              </div>
              {/* practice skeleton */}
              <div style={{background:T.s100,borderRadius:16,padding:'13px 14px',display:'flex',gap:10,alignItems:'center'}}>
                <Sk w={36} h={36} r={10}/>
                <div style={{flex:1,display:'flex',flexDirection:'column',gap:6}}>
                  <Sk w="40%" h={9}/>
                  <Sk w="65%" h={12}/>
                </div>
              </div>
              {/* quick nav skeleton */}
              <div style={{display:'flex',gap:8}}>
                {[0,1].map(i=><div key={i} style={{flex:1,background:'#fff',borderRadius:13,padding:12,display:'flex',flexDirection:'column',alignItems:'center',gap:8,border:`1px solid ${T.s200}`}}><Sk w={20} h={20} r={5}/><Sk w="50%" h={9}/></div>)}
              </div>
            </div>
            <TabBar active="home"/>
          </div>
        </Phone>
        <div className="ph-label">Loading · skeleton</div>
        <div className="note" style={{width:264,marginTop:10}}>
          <strong>Implementação</strong>
          Skeletons em stone-200/100 com shimmer CSS. Duração máxima: 2s. Se > 2s sem resposta → estado de erro. Skeletons mantêm a estrutura exata do layout final — sem layout shift ao carregar.
        </div>
      </div>

      {/* EMPTY */}
      <div>
        <Phone>
          <div style={{background:T.s50,minHeight:520,display:'flex',flexDirection:'column'}}>
            <div style={{padding:'34px 18px 0',flex:1}}>
              <div style={{fontSize:11,color:T.s400,marginBottom:2}}>Boa tarde</div>
              <div style={{fontSize:22,fontWeight:800,color:T.s900,letterSpacing:'-.02em',marginBottom:28}}>Adriano</div>

              {/* Empty hero */}
              <div style={{background:'#fff',borderRadius:20,padding:'28px 20px',border:`1px solid ${T.s200}`,textAlign:'center',marginBottom:14}}>
                <div style={{width:56,height:56,borderRadius:16,background:T.g50,display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 14px'}}>
                  <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke={T.g500} strokeWidth="1.5" strokeLinecap="round"><circle cx="12" cy="12" r="10"/><path d="M8 12c0-2.21 1.79-4 4-4s4 1.79 4 4"/><path d="M12 12v4"/></svg>
                </div>
                <div style={{fontSize:15,fontWeight:800,color:T.s900,marginBottom:6}}>Bem-vindo ao MindUni</div>
                <div style={{fontFamily:"'Lora',Georgia,serif",fontStyle:'italic',fontSize:13,color:T.s500,lineHeight:1.65,marginBottom:20}}>Comece uma conversa com o Sage — leva menos de 2 minutos.</div>
                <div style={{background:T.g500,color:'#fff',borderRadius:12,padding:'13px',fontSize:13,fontWeight:700,cursor:'pointer'}}>Começar com o Sage</div>
              </div>

              {/* Secondary actions */}
              <div style={{display:'flex',gap:8}}>
                {[{l:'Explorar práticas'},{l:'Escrever no diário'}].map(a=>(
                  <div key={a.l} style={{flex:1,background:'#fff',borderRadius:13,padding:'11px 8px',border:`1px solid ${T.s200}`,textAlign:'center'}}>
                    <div style={{fontSize:10,fontWeight:600,color:T.s500,lineHeight:1.3}}>{a.l}</div>
                  </div>
                ))}
              </div>
            </div>
            <TabBar active="home"/>
          </div>
        </Phone>
        <div className="ph-label">Empty · primeiro acesso</div>
        <div className="note" style={{width:264,marginTop:10}}>
          <strong>Lógica</strong>
          Mostrar se: sem sessões no Supabase E sem dados locais. CTA primário → /chat. A mensagem do Sage usa Lora italic mesmo no empty state. CVV não aparece aqui — o usuário ainda não está em estado de risco.
        </div>
      </div>

      {/* ERROR */}
      <div>
        <Phone>
          <div style={{background:T.s50,minHeight:520,display:'flex',flexDirection:'column'}}>
            <div style={{padding:'34px 18px 0',flex:1}}>
              <div style={{fontSize:11,color:T.s400,marginBottom:2}}>Boa tarde</div>
              <div style={{fontSize:22,fontWeight:800,color:T.s900,letterSpacing:'-.02em',marginBottom:14}}>Adriano</div>

              {/* Offline banner */}
              <div style={{background:T.a50,border:`1px solid ${T.a100}`,borderRadius:10,padding:'10px 13px',display:'flex',gap:9,alignItems:'center',marginBottom:14}}>
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke={T.a400} strokeWidth="2" strokeLinecap="round"><circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/></svg>
                <div style={{flex:1}}>
                  <div style={{fontSize:11,fontWeight:700,color:T.a500}}>Sem conexão</div>
                  <div style={{fontSize:10,color:T.s500}}>Mostrando dados salvos localmente</div>
                </div>
              </div>

              {/* Cached XP */}
              <div style={{background:'#fff',borderRadius:18,padding:'15px 16px',border:`1px solid ${T.s200}`,marginBottom:10,opacity:.85}}>
                <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:10}}>
                  <div style={{width:34,height:34,borderRadius:10,background:T.g50,display:'flex',alignItems:'center',justifyContent:'center'}}>
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke={T.g500} strokeWidth="1.5" strokeLinejoin="round"><path d="M12 2L15 9H22L16.5 13.5L18.5 20L12 16L5.5 20L7.5 13.5L2 9H9L12 2Z"/></svg>
                  </div>
                  <div style={{flex:1}}>
                    <div style={{fontSize:12,fontWeight:700,color:T.s900}}>Nível 3 · Mente Curiosa</div>
                    <div style={{fontSize:10,color:T.s400}}>Dados do último acesso</div>
                  </div>
                </div>
                <div style={{height:4,background:T.g50,borderRadius:99,overflow:'hidden'}}>
                  <div style={{height:'100%',width:'62%',background:T.g500,borderRadius:99}}/>
                </div>
              </div>

              {/* Practice locked */}
              <div style={{background:T.s100,borderRadius:16,padding:'13px 14px',border:`1px dashed ${T.s300}`,display:'flex',gap:10,alignItems:'center'}}>
                <div style={{width:36,height:36,borderRadius:10,background:T.s200,display:'flex',alignItems:'center',justifyContent:'center'}}>
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke={T.s400} strokeWidth="1.5"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
                </div>
                <div>
                  <div style={{fontSize:11,fontWeight:700,color:T.s500}}>Prática indisponível offline</div>
                  <div style={{fontSize:10,color:T.s400}}>Conecte-se para acessar</div>
                </div>
              </div>
            </div>
            <TabBar active="home"/>
          </div>
        </Phone>
        <div className="ph-label">Erro · modo offline</div>
        <div className="note" style={{width:264,marginTop:10}}>
          <strong>Estratégia</strong>
          Dados de XP/streak em AsyncStorage — sempre disponíveis. Banner âmbar (não vermelho — não é culpa do usuário). Práticas bloqueadas offline com estado dashed-border. Chat indisponível offline → botão desabilitado com mensagem.
        </div>
      </div>
    </div>

    {/* Diário empty */}
    <div style={{marginTop:48}}>
      <div className="sec-num">Seção 1.2</div>
      <div className="sec-title" style={{fontSize:18,marginBottom:4}}>Diário — empty state com prompt (1ª abertura)</div>
      <div className="sec-sub" style={{marginBottom:20}}>Prompt suave inline, apenas na primeira abertura. Flag <code style={{fontFamily:'monospace',fontSize:11,background:T.s200,padding:'1px 6px',borderRadius:4}}>hasOpenedDiary</code> em AsyncStorage.</div>
      <div className="g2">
        {/* First open */}
        <div>
          <Phone>
            <div style={{background:T.s50,minHeight:520,display:'flex',flexDirection:'column'}}>
              <div style={{padding:'34px 18px 0',flex:1}}>
                <div style={{fontSize:20,fontWeight:800,color:T.s900,letterSpacing:'-.02em',marginBottom:2}}>Diário emocional</div>
                <div style={{fontSize:12,color:T.s400,marginBottom:24}}>Outubro 2024</div>

                {/* Prompt card */}
                <div style={{background:'#fff',borderRadius:18,padding:'22px 18px',border:`1.5px solid ${T.g100}`,marginBottom:12}}>
                  <div style={{width:44,height:44,borderRadius:13,background:T.g50,display:'flex',alignItems:'center',justifyContent:'center',marginBottom:14}}>
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke={T.g500} strokeWidth="1.5" strokeLinecap="round"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></svg>
                  </div>
                  <div style={{fontSize:14,fontWeight:800,color:T.s900,marginBottom:8}}>Seu espaço de escrita</div>
                  <div style={{fontFamily:"'Lora',Georgia,serif",fontStyle:'italic',fontSize:13,color:T.s500,lineHeight:1.7,marginBottom:18}}>Não precisa ser elaborado. Escreva o que está na sua cabeça agora — uma frase já conta.</div>
                  <div style={{background:T.g500,color:'#fff',borderRadius:12,padding:'12px',fontSize:13,fontWeight:700,textAlign:'center',cursor:'pointer',marginBottom:8}}>Escrever primeira entrada</div>
                  <div style={{fontSize:11,color:T.s400,textAlign:'center'}}>Só você lê isso</div>
                </div>
              </div>

              {/* FAB */}
              <div style={{position:'relative'}}>
                <div style={{position:'absolute',bottom:76,right:16,width:44,height:44,borderRadius:22,background:T.g500,display:'flex',alignItems:'center',justifyContent:'center',boxShadow:'0 4px 14px rgba(61,122,103,.35)',zIndex:2}}>
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2" strokeLinecap="round"><path d="M12 5v14M5 12h14"/></svg>
                </div>
              </div>
              <TabBar active="journal"/>
            </div>
          </Phone>
          <div className="ph-label">1ª abertura · prompt ativo</div>
        </div>

        {/* Subsequent empty */}
        <div>
          <Phone>
            <div style={{background:T.s50,minHeight:520,display:'flex',flexDirection:'column'}}>
              <div style={{padding:'34px 18px 0',flex:1}}>
                <div style={{fontSize:20,fontWeight:800,color:T.s900,letterSpacing:'-.02em',marginBottom:2}}>Diário emocional</div>
                <div style={{fontSize:12,color:T.s400,marginBottom:24}}>Outubro 2024</div>

                {/* Clean empty state */}

                  <div style={{fontSize:9,fontWeight:600,color:T.g400}}>● {t.label}</div>
                </div>
                <div style={{display:'flex',alignItems:'center',gap:5,padding:'5px 9px',borderRadius:8,background:t.id==='ancora'||t.id==='retomada'?T.crL:T.s100,border:`1px solid ${t.id==='ancora'||t.id==='retomada'?T.crB:T.s200}`,color:t.id==='ancora'||t.id==='retomada'?T.cr:T.s400}}>
                  <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M6.6 10.8c1.4 2.8 3.8 5.1 6.6 6.6l2.2-2.2c.3-.3.7-.4 1-.2 1.1.4 2.3.6 3.6.6.6 0 1 .4 1 1V20c0 .6-.4 1-1 1-9.4 0-17-7.6-17-17 0-.6.4-1 1-1h3.5c.6 0 1 .4 1 1 0 1.3.2 2.5.6 3.6.1.3 0 .7-.2 1L6.6 10.8z"/></svg>
                  <span style={{fontSize:10,fontWeight:700}}>188</span>
                </div>
              </div>

              {/* Chat */}
              <div style={{flex:1,padding:'14px 13px',background:T.s100,display:'flex',flexDirection:'column',gap:11,minHeight:300}}>
                {t.user.map((u,i) => (
                  <div key={`u${i}`}>
                    <div style={{display:'flex',justifyContent:'flex-end',marginBottom:11}}>
                      <div style={{background:T.g500,borderRadius:14,borderTopRightRadius:4,padding:'9px 13px',maxWidth:'80%'}}>
                        <div style={{fontSize:12,color:'#fff',lineHeight:1.6}}>{u}</div>
                      </div>
                    </div>
                    {t.msgs[i] && (
                      <div style={{display:'flex',gap:7,alignItems:'flex-end'}}>
                        <div style={{width:24,height:24,borderRadius:12,background:T.g100,flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center'}}>
                          <svg width="12" height="12" viewBox="0 0 20 20" fill="none" stroke={T.g500} strokeWidth="1.4"><circle cx="10" cy="10" r="8"/><path d="M7 10c0-1.66 1.34-3 3-3s3 1.34 3 3-1.34 3-3 3"/></svg>
                        </div>
                        <div style={{background:'#fff',borderRadius:14,borderTopLeftRadius:4,padding:'10px 13px',maxWidth:'82%',boxShadow:'0 1px 4px rgba(0,0,0,.06)',border:`1px solid ${t.border}`}}>
                          <div style={{fontFamily:"'Lora',Georgia,serif",fontStyle:'italic',fontSize:12,color:T.s800,lineHeight:1.7}}>{t.msgs[i]}</div>
                        </div>
                      </div>
                    )}
                  </div>
                ))}
                {/* Extra Sage messages */}
                {t.msgs.slice(t.user.length).map((msg,i) => (
                  <div key={`s${i}`} style={{display:'flex',gap:7,alignItems:'flex-end'}}>
                    <div style={{width:24,height:24,borderRadius:12,background:T.g100,flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center'}}>
                      <svg width="12" height="12" viewBox="0 0 20 20" fill="none" stroke={T.g500} strokeWidth="1.4"><circle cx="10" cy="10" r="8"/><path d="M7 10c0-1.66 1.34-3 3-3s3 1.34 3 3-1.34 3-3 3"/></svg>
                    </div>
                    <div style={{background:'#fff',borderRadius:14,borderTopLeftRadius:4,padding:'10px 13px',maxWidth:'82%',boxShadow:'0 1px 4px rgba(0,0,0,.06)',border:`1px solid ${t.border}`}}>
                      <div style={{fontFamily:"'Lora',Georgia,serif",fontStyle:'italic',fontSize:12,color:T.s800,lineHeight:1.7}}>{msg}</div>
                    </div>
                  </div>
                ))}
              </div>

              {/* Input */}
              <div style={{background:'#fff',borderTop:`1px solid ${T.s200}`,padding:'10px 12px',display:'flex',gap:8,alignItems:'center'}}>
                <div style={{flex:1,background:T.s100,borderRadius:22,padding:'9px 13px',fontSize:12,color:T.s400}}>Responder…</div>
                <div style={{width:34,height:34,borderRadius:17,background:T.g500,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                  <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2" strokeLinecap="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
                </div>
              </div>
            </div>
          </Phone>
          <div className="ph-label">Tom: {t.label}</div>
        </div>

        {/* Spec */}
        <div style={{display:'flex',flexDirection:'column',gap:14}}>
          <div style={{background:'#fff',border:`1px solid ${T.s200}`,borderRadius:14,overflow:'hidden'}}>
            <div style={{background:t.color,padding:'13px 18px',display:'flex',alignItems:'center',gap:10}}>
              <div style={{fontSize:13,fontWeight:800,color:'#fff'}}>{t.label}</div>
              {t.alert && <div style={{background:'rgba(255,255,255,.2)',fontSize:10,fontWeight:700,padding:'2px 9px',borderRadius:99,color:'#fff'}}>⚠ Uso restrito</div>}
            </div>
            <div style={{padding:'18px'}}>
              <div style={{fontSize:13,color:T.s700,lineHeight:1.65,marginBottom:14}}>{t.desc}</div>
              <div style={{display:'flex',gap:8,alignItems:'flex-start'}}>
                <div style={{fontSize:10,fontWeight:700,letterSpacing:'.06em',textTransform:'uppercase',color:T.s400,marginTop:2,flexShrink:0}}>Quando</div>
                <div style={{fontSize:12,color:T.s600,lineHeight:1.5,background:T.s50,padding:'7px 11px',borderRadius:8,flex:1}}>{t.quando}</div>
              </div>
            </div>
          </div>

          {/* Copy principles */}
          <div className="note">
            <strong>Princípios de copy para este tom</strong>
            {t.id === 'acolhedor' && 'Frases curtas. Sem diagnóstico. Sempre termina com uma pergunta aberta. Nunca "eu entendo" — em vez disso, "faz sentido".'}
            {t.id === 'reflexivo' && 'Usa metáforas corporais ("onde você sente isso"). Nunca dá resposta — só devolve a pergunta de forma mais focada. Sem "talvez você deveria".'}
            {t.id === 'sugestivo' && 'Cita algo que o próprio usuário disse. Sempre pede permissão ("quer tentar?"). Nunca imperativo. Sugere uma coisa por vez.'}
            {t.id === 'ancora' && 'Uma frase apenas. Sem perguntas. Sem sugestões. Sem diagnóstico. Presença pura. A próxima ação é do sistema (modal), não do Sage.'}
            {t.id === 'retomada' && 'Sem pressão para continuar. Sem "como você está?" imediato — o usuário acabou de passar por um momento difícil. Silêncio é uma resposta válida.'}
          </div>

          {/* Prompt engineering note */}
          <div className="note note-g">
            <strong>Prompt engineering</strong>
            {t.id === 'acolhedor' && 'System prompt base. Nenhum contexto emocional de crise detectado. Temperatura Gemini: 0.7.'}
            {t.id === 'reflexivo' && 'Sistema injeta: "O usuário está explorando emoções complexas. Use reflexão ativa. Não ofereça soluções ainda." Temperatura: 0.6.'}
            {t.id === 'sugestivo' && 'Sistema injeta: "O usuário demonstrou abertura para ação. Sugira UMA prática relevante com permissão explícita." Temperatura: 0.5.'}
            {t.id === 'ancora' && 'Mensagem hardcoded — NÃO gerada pelo Gemini. Texto fixo no código. Zero variação. Acionada por threshold de crise.'}
            {t.id === 'retomada' && 'Sistema injeta: "O usuário acabou de interagir com o modal de crise. Presença antes de conteúdo. Não pergunte como está." Temperatura: 0.4.'}
          </div>

          {t.id === 'ancora' && (
            <div className="note note-r">
              <strong>⚠ Texto fixo — não gerar com IA</strong>
              A mensagem âncora é a única que NÃO usa Gemini. Está hardcoded no frontend. Razão: nenhuma variação pode comprometer este momento. Revisão semestral por especialista em saúde mental.
            </div>
          )}
        </div>
      </div>
    </div>
  );
};

/* ── App ── */
function App() {
  return (
    <div>
      <div id="estados" className="sec">
        <DashboardStates />
      </div>
      <CrisisSection />
      <SageVoiceSection />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

<style>
@keyframes bounce {
  0%,60%,100%{transform:translateY(0);opacity:.45}
  30%{transform:translateY(-4px);opacity:1}
}
</style>
</body>
</html>
