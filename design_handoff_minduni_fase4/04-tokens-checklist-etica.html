body{font-family:'Inter',-apple-system,sans-serif;background:var(--s100);color:var(--s900);font-size:14px;line-height:1.6}

.dh{background:var(--s900);color:#fff;padding:48px 0 36px}

.phase-tag{display:inline-flex;align-items:center;gap:8px;background:var(--g700);color:var(--g100);font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:5px 14px;border-radius:99px;margin-bottom:14px}

.dh p{font-size:13px;color:var(--s400)}
.dh .meta{display:flex;gap:20px;margin-top:16px;flex-wrap:wrap}
.dh .meta span{font-size:11px;color:var(--s500);display:flex;align-items:center;gap:5px}

nav{background:#fff;border-bottom:1px solid var(--s200);position:sticky;top:0;z-index:200;overflow-x:auto}
nav .in{max-width:1280px;margin:0 auto;padding:0 48px;display:flex;white-space:nowrap}
nav a{display:block;padding:13px 16px;font-size:12px;font-weight:600;color:var(--s400);text-decoration:none;border-bottom:2px solid transparent}

.page{max-width:1280px;margin:0 auto;padding:0 48px 120px}
.sec{padding:56px 0;border-bottom:1px solid var(--s200);scroll-margin-top:54px}
.sec:last-child{border-bottom:none}
.sec-num{font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--s400);margin-bottom:4px}
.sec-title{font-size:22px;font-weight:800;letter-spacing:-.02em;margin-bottom:6px}
.sec-sub{font-size:13px;color:var(--s500);margin-bottom:28px;max-width:620px}

.code{background:var(--s900);color:#E2DDD8;font-family:'JetBrains Mono',ui-monospace,monospace;font-size:11.5px;padding:22px 26px;border-radius:14px;overflow-x:auto;white-space:pre;line-height:1.65}
.ck{color:#C084FC}.cv{color:#86EFAC}.cs{color:#FCA5A5}.cn{color:#93C5FD}.cg{color:#6B7280}.co{color:#FCD34D}

.card{background:#fff;border:1px solid var(--s200);border-radius:14px;padding:22px 24px}
.card+.card{margin-top:14px}
.card-label{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--s400);margin-bottom:14px}

/* checklist */
.checklist{display:flex;flex-direction:column;gap:0}
.cl-item{display:grid;grid-template-columns:32px 1fr auto;gap:12px;padding:13px 0;border-bottom:1px solid var(--s100);align-items:start}
.cl-item:last-child{border-bottom:none}
.cl-num{font-size:11px;font-weight:800;color:var(--s300);padding-top:1px}
.cl-title{font-size:13px;font-weight:700;color:var(--s900);margin-bottom:2px}
.cl-desc{font-size:12px;color:var(--s500);line-height:1.5}

.priority{display:inline-block;font-size:9px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;padding:2px 8px;border-radius:99px;white-space:nowrap}
.p-critical{background:#FDF2F2;color:var(--cr)}
.p-high{background:var(--a50);color:var(--a500)}
.p-medium{background:var(--g50);color:var(--g600)}
.p-low{background:var(--s100);color:var(--s500)}

.comp-card{background:var(--s50);border:1px solid var(--s200);border-radius:12px;padding:14px 16px}
.comp-name{font-size:12px;font-weight:700;color:var(--s900);margin-bottom:4px;display:flex;align-items:center;gap:6px}
.comp-path{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--s400);margin-bottom:8px}

.eth-title{font-size:13px;font-weight:700;color:var(--s900);margin-bottom:3px}
.eth-desc{font-size:12px;color:var(--s500);line-height:1.5}

.copy-row:last-child{border-bottom:none}
.copy-ctx{font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--s400);margin-bottom:6px}

.g2{display:grid;grid-template-columns:1fr 1fr;gap:20px}

.a11y-row:last-child{border-bottom:none}

  const priorities = [
    {id:'critical', label:'Crítico', cls:'p-critical', desc:'Bug ou risco ético — implementar antes de qualquer release'},

  const completed = Object.values(done).filter(Boolean).length;

  return (
    <div id="checklist" className="sec">

      <div style={{display:'flex',gap:10,flexWrap:'wrap',marginBottom:20}}>

          </div>

      {/* Items */}
      <div className="card" style={{padding:'0 24px'}}>
        <div className="checklist">
          {items.map((item,i) => (
            <div key={item.id} className="cl-item" style={{opacity: done[item.id] ? .45 : 1, cursor:'pointer'}} onClick={() => toggle(item.id)}>
              <div className="cl-num">
                <div style={{
                  width:22,height:22,borderRadius:6,
                  border:('1.5px solid ' + (done[item.id] ? T.g500 : T.s300)),
                  background: done[item.id] ? T.g500 : 'transparent',
                  display:'flex',alignItems:'center',justifyContent:'center',
                  transition:'all .15s',
                }}>
                  {done[item.id] && <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="3" strokeLinecap="round"><path d="M20 6L9 17l-5-5"/></svg>}

              </div>
              <div>
                <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:3,flexWrap:'wrap'}}>
                  <span className={'priority ' + {critical:'p-critical',high:'p-high',medium:'p-medium',low:'p-low'}[item.priority]}>{item.priority === 'critical' ? 'Crítico' : item.priority === 'high' ? 'Alto' : item.priority === 'medium' ? 'Médio' : 'Baixo'}</span>
                  <span className="cl-title" style={{margin:0}}>{item.title}</span>

              </div>

        </div>

};
