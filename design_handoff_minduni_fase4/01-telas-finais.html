<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MindUni — Fase 4 / Bloco 1: Telas Finais</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Lora:ital,wght@1,400;1,500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --s50:#FAFAF8;--s100:#F4F2EE;--s200:#E6E2DB;--s300:#CEC9BF;
  --s400:#A29D95;--s500:#756F66;--s600:#5A544C;--s700:#3A3731;
  --s800:#282521;--s900:#1C1917;
  --g50:#EEF5F1;--g100:#D4E9DE;--g200:#A9D3BF;--g300:#7BBFA4;
  --g400:#5E9B84;--g500:#3D7A67;--g600:#2D6254;--g700:#1E4D41;
  --a50:#FEF8EC;--a100:#FCEECE;--a400:#D4973E;--a500:#B87A28;
  --cr:#C04A4A;--cr-l:#FDF2F2;--cr-b:#F5C6C6;
  --dk:#131210;--dk-s:#1D1B17;--dk-b:#2C2922;
  --font:'Inter',-apple-system,sans-serif;
  --sage:'Lora',Georgia,serif;
}
body{font-family:var(--font);background:var(--s100);color:var(--s900);font-size:14px;line-height:1.6}

.dh{background:var(--s900);color:#fff;padding:48px 0 36px}
.dh .inner{max-width:1280px;margin:0 auto;padding:0 48px}
.phase-tag{display:inline-flex;align-items:center;gap:8px;background:var(--g700);color:var(--g100);font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:5px 14px;border-radius:99px;margin-bottom:14px}
.dh h1{font-size:30px;font-weight:800;letter-spacing:-.025em;margin-bottom:6px}
.dh p{font-size:13px;color:var(--s400)}
.locked-tag{display:inline-flex;align-items:center;gap:5px;background:var(--g600);color:var(--g100);font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:4px 12px;border-radius:99px;margin-left:12px;vertical-align:middle}

nav{background:#fff;border-bottom:1px solid var(--s200);position:sticky;top:0;z-index:100;overflow-x:auto}
nav .inner{max-width:1280px;margin:0 auto;padding:0 48px;display:flex;white-space:nowrap}
nav a{display:block;padding:13px 16px;font-size:12px;font-weight:600;color:var(--s400);text-decoration:none;border-bottom:2px solid transparent;transition:color .15s}
nav a:hover,nav a.active{color:var(--g500);border-bottom-color:var(--g500)}

.page{max-width:1280px;margin:0 auto;padding:0 48px 120px}

.screen-block{padding:56px 0;border-bottom:1px solid var(--s200);scroll-margin-top:54px}
.screen-block:last-child{border-bottom:none}
.screen-num{font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--s400);margin-bottom:4px}
.screen-title{font-size:24px;font-weight:800;letter-spacing:-.02em;margin-bottom:4px}
.screen-sub{font-size:13px;color:var(--s500);margin-bottom:32px;max-width:560px}

.screen-layout{display:grid;grid-template-columns:auto 1fr;gap:48px;align-items:start}
@media(max-width:900px){.screen-layout{grid-template-columns:1fr}}

/* Phone */
.phone-wrap{display:flex;flex-direction:column;align-items:center;gap:12px}
.phone{width:280px;background:var(--s50);border-radius:44px;border:8px solid var(--s900);overflow:hidden;position:relative;box-shadow:0 24px 64px rgba(0,0,0,.2);flex-shrink:0}
.notch{width:72px;height:22px;background:var(--s900);border-radius:0 0 14px 14px;position:absolute;top:0;left:50%;transform:translateX(-50%);z-index:5}
.phone-label{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--s400)}

/* Spec card */
.spec{background:#fff;border:1px solid var(--s200);border-radius:16px;overflow:hidden}
.spec-header{background:var(--s900);color:#fff;padding:14px 20px;display:flex;align-items:center;justify-content:space-between}
.spec-header h3{font-size:12px;font-weight:700;letter-spacing:.06em;text-transform:uppercase}
.spec-body{padding:20px}
.spec-row{display:grid;grid-template-columns:140px 1fr;gap:16px;padding:12px 0;border-bottom:1px solid var(--s100)}
.spec-row:last-child{border-bottom:none}
.spec-label{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--s400);padding-top:2px}
.spec-val{font-size:12px;color:var(--s700);line-height:1.6}
.spec-val code{font-family:'JetBrains Mono',monospace;font-size:11px;background:var(--s100);padding:1px 6px;border-radius:4px;color:var(--g600)}
.spec-val .tok{display:inline-block;font-family:'JetBrains Mono',monospace;font-size:10px;background:var(--g50);border:1px solid var(--g100);color:var(--g600);padding:1px 7px;border-radius:4px;margin:2px 2px 2px 0}
.spec-val .st{display:inline-block;font-size:10px;font-weight:600;padding:2px 9px;border-radius:99px;margin:2px 2px 2px 0}
.st-default{background:var(--g50);color:var(--g600)}
.st-loading{background:var(--a50);color:var(--a500)}
.st-empty{background:var(--s100);color:var(--s500)}
.st-error{background:var(--cr-l);color:var(--cr)}
.st-disabled{background:var(--s100);color:var(--s400)}

.final-stamp{display:flex;align-items:center;gap:10px;background:var(--g50);border:1px solid var(--g100);border-radius:10px;padding:12px 16px;margin-top:20px}
.final-stamp svg{flex-shrink:0}
.final-stamp p{font-size:12px;color:var(--g700);line-height:1.5}
.final-stamp strong{color:var(--g600)}
</style>
</head>
<body>

<div class="dh">
  <div class="inner">
    <div class="phase-tag">▸ Fase 4 · Bloco 1</div>
    <h1>Telas Finais <span class="locked-tag">✓ Variação A</span></h1>
    <p>7 telas em direção visual definitiva · Fichas técnicas para handoff · Sem comparações A/B</p>
  </div>
</div>

<nav>
  <div class="inner">
    <a href="#login">01 Login</a>
    <a href="#onboarding">02 Onboarding</a>
    <a href="#dashboard">03 Dashboard</a>
    <a href="#chat">04 Chat</a>
    <a href="#desafios">05 Desafios</a>
    <a href="#diario">06 Diário</a>
    <a href="#perfil">07 Perfil</a>
  </div>
</nav>

<div class="page" id="root"></div>

<script type="text/babel">


const { useState, useRef } = React;

/* ── tokens ── */
const T = {
  s50: '#FAFAF8', s100: '#F4F2EE', s200: '#E6E2DB', s300: '#CEC9BF',
  s400: '#A29D95', s500: '#756F66', s600: '#5A544C', s700: '#3A3731',
  s800: '#282521', s900: '#1C1917',
  g50: '#EEF5F1', g100: '#D4E9DE', g200: '#A9D3BF', g300: '#7BBFA4',
  g400: '#5E9B84', g500: '#3D7A67', g600: '#2D6254', g700: '#1E4D41',
  a50: '#FEF8EC', a100: '#FCEECE', a400: '#D4973E', a500: '#B87A28',
  cr: '#C04A4A', crL: '#FDF2F2', crB: '#F5C6C6',
  dk: '#131210', dks: '#1D1B17', dkb: '#2C2922'
};

/* ── icons (minimal SVGs) ── */
const Ic = {
  home: <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" /></svg>,
  chat: <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" /></svg>,
  practice: <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M12 22c5.5 0 10-4.5 10-10S17.5 2 12 2 2 6.5 2 12s4.5 10 10 10z" stroke="currentColor" strokeWidth="1.8" /><path d="M12 6v6l4 2" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" /></svg>,
  journal: <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M4 19.5A2.5 2.5 0 016.5 17H20" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" /><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z" stroke="currentColor" strokeWidth="1.8" /></svg>,
  profile: <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" /><circle cx="12" cy="7" r="4" stroke="currentColor" strokeWidth="1.8" /></svg>,
  phone: <svg width="13" height="13" viewBox="0 0 24 24" fill="none"><path d="M6.6 10.8c1.4 2.8 3.8 5.1 6.6 6.6l2.2-2.2c.3-.3.7-.4 1-.2 1.1.4 2.3.6 3.6.6.6 0 1 .4 1 1V20c0 .6-.4 1-1 1-9.4 0-17-7.6-17-17 0-.6.4-1 1-1h3.5c.6 0 1 .4 1 1 0 1.3.2 2.5.6 3.6.1.3 0 .7-.2 1L6.6 10.8z" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" /></svg>,
  sage: <svg width="14" height="14" viewBox="0 0 20 20" fill="none"><circle cx="10" cy="10" r="8" stroke="currentColor" strokeWidth="1.4" /><path d="M7 10c0-1.66 1.34-3 3-3s3 1.34 3 3-1.34 3-3 3" stroke="currentColor" strokeWidth="1.4" strokeLinecap="round" /></svg>,
  check: <svg width="10" height="10" viewBox="0 0 24 24" fill="none"><path d="M20 6L9 17l-5-5" stroke="white" strokeWidth="2.5" strokeLinecap="round" /></svg>,
  chevR: <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M9 18l6-6-6-6" stroke="currentColor" strokeWidth="2" strokeLinecap="round" /></svg>,
  flame: <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M12 2c0 6-6 7-6 13a6 6 0 0012 0c0-6-6-7-6-13z" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" /><path d="M12 12c0 3-2 4-2 6a2 2 0 004 0c0-2-2-3-2-6z" stroke="currentColor" strokeWidth="1.4" strokeLinecap="round" /></svg>,
  star: <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M12 2L15 9H22L16.5 13.5L18.5 20L12 16L5.5 20L7.5 13.5L2 9H9L12 2Z" stroke="currentColor" strokeWidth="1.5" strokeLinejoin="round" /></svg>,
  lock: <svg width="12" height="12" viewBox="0 0 24 24" fill="none"><rect x="3" y="11" width="18" height="11" rx="2" stroke="currentColor" strokeWidth="1.5" /><path d="M7 11V7a5 5 0 0110 0v4" stroke="currentColor" strokeWidth="1.5" /></svg>,
  send: <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><line x1="22" y1="2" x2="11" y2="13" stroke="currentColor" strokeWidth="2" strokeLinecap="round" /><polygon points="22 2 15 22 11 13 2 9 22 2" stroke="currentColor" strokeWidth="2" strokeLinecap="round" /></svg>,
  plus: <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12h14" stroke="currentColor" strokeWidth="2" strokeLinecap="round" /></svg>,
  award: <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="8" r="6" stroke="currentColor" strokeWidth="1.8" /><path d="M8.21 13.89L7 23l5-3 5 3-1.21-9.12" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" /></svg>,
  settings: <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="3" stroke="currentColor" strokeWidth="1.8" /><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z" stroke="currentColor" strokeWidth="1.8" /></svg>
};

/* ── Phone shell ── */
const Phone = ({ children, style = {} }) =>
<div className="phone" style={style}>
    <div className="notch" />
    {children}
  </div>;


/* ── Tab bar ── */
const TabBar = ({ active = 'home' }) => {
  const tabs = [
  { id: 'home', label: 'Início', ic: Ic.home },
  { id: 'chat', label: 'Sage', ic: Ic.chat },
  { id: 'practice', label: 'Práticas', ic: Ic.practice },
  { id: 'journal', label: 'Diário', ic: Ic.journal },
  { id: 'profile', label: 'Jornada', ic: Ic.profile }];

  return (
    <div style={{ background: '#fff', borderTop: `1px solid ${T.s200}`, display: 'flex', padding: '10px 0 16px' }}>
      {tabs.map((t) => {
        const on = t.id === active;
        return (
          <div key={t.id} style={{ flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 3, position: 'relative' }}>
            {on && <div style={{ position: 'absolute', top: -10, width: 18, height: 3, background: T.g500, borderRadius: '0 0 3px 3px' }} />}
            <div style={{ color: on ? T.g500 : T.s400 }}>{t.ic}</div>
            <div style={{ fontSize: 9, fontWeight: on ? 700 : 600, color: on ? T.g500 : T.s400 }}>{t.label}</div>
          </div>);

      })}
    </div>);

};

/* ── CVV footer ── */
const CVVLine = ({ center = false }) =>
<div style={{ display: 'flex', alignItems: 'center', gap: 5, justifyContent: center ? 'center' : 'flex-start', color: T.s400 }}>
    {Ic.phone}
    <span style={{ fontSize: 10, fontWeight: 600, color: T.s400 }}>CVV 188 · gratuito · 24h</span>
  </div>;


/* ── Spec card ── */
const SpecCard = ({ screenName, components, tokens, states, mobile }) =>
<div>
    <div className="spec">
      <div className="spec-header">
        <h3>Ficha Técnica — {screenName}</h3>
        <span style={{ fontSize: 10, color: T.s400, fontFamily: 'monospace' }}>handoff</span>
      </div>
      <div className="spec-body">
        <div className="spec-row">
          <div className="spec-label">Componentes</div>
          <div className="spec-val">{components.map((c, i) => <span key={i} style={{ display: 'inline-block', margin: '2px 4px 2px 0', fontSize: 11, fontWeight: 600, padding: '2px 8px', borderRadius: 5, background: T.s100, color: T.s700 }}>{c}</span>)}</div>
        </div>
        <div className="spec-row">
          <div className="spec-label">Tokens de cor</div>
          <div className="spec-val">{tokens.map((tk, i) => <span key={i} className="tok">{tk}</span>)}</div>
        </div>
        <div className="spec-row">
          <div className="spec-label">Estados</div>
          <div className="spec-val">{states.map((s, i) => <span key={i} className={`st ${s.cls}`}>{s.label}</span>)}</div>
        </div>
        <div className="spec-row">
          <div className="spec-label">Mobile / gestos</div>
          <div className="spec-val" style={{ whiteSpace: 'pre-line' }}>{mobile}</div>
        </div>
      </div>
    </div>
    <div className="final-stamp">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M20 6L9 17l-5-5" stroke="#3D7A67" strokeWidth="2.5" strokeLinecap="round" /></svg>
      <p><strong>Esta é a versão final visual da tela {screenName}.</strong> Nenhuma alteração estética prevista a partir daqui.</p>
    </div>
  </div>;


/* ══════════════════════════════════════════════════
   TELA 01 — LOGIN
══════════════════════════════════════════════════ */
const LoginScreen = () => {
  const [email, setEmail] = useState('adriano@usp.br');
  const [focused, setFocused] = useState(null);
  return (
    <div id="login" className="screen-block">
      <div className="screen-num">Tela 01 / 07</div>
      <div className="screen-title">Login / Autenticação</div>
      <div className="screen-sub">Entrada limpa. Sem afirmações falsas de privacidade. Google SSO como opção primária para reduzir atrito.</div>
      <div className="screen-layout">
        <div className="phone-wrap">
          <Phone>
            <div style={{ background: T.s50, minHeight: 580, display: 'flex', flexDirection: 'column', padding: '48px 22px 28px' }}>
              {/* Logo area */}
              <div style={{ marginBottom: 36 }}>
                <div style={{ width: 44, height: 44, borderRadius: 14, background: T.g500, display: 'flex', alignItems: 'center', justifyContent: 'center', marginBottom: 14 }}>
                  <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10 10-4.5 10-10S17.5 2 12 2z" stroke="white" strokeWidth="1.8" /><path d="M8 12c0-2.21 1.79-4 4-4s4 1.79 4 4" stroke="white" strokeWidth="1.8" strokeLinecap="round" /><path d="M12 12v4" stroke="white" strokeWidth="1.8" strokeLinecap="round" /></svg>
                </div>
                <div style={{ fontSize: 22, fontWeight: 800, color: T.s900, letterSpacing: '-.02em', marginBottom: 4 }}>MindUni</div>
                <div style={{ fontSize: 13, color: T.s500 }}>Bem-vindo de volta</div>
              </div>

              {/* Google SSO */}
              <div style={{ background: '#fff', border: `1.5px solid ${T.s200}`, borderRadius: 12, padding: '13px 16px', display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 10, marginBottom: 20, cursor: 'pointer' }}>
                <svg width="16" height="16" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4" /><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853" /><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05" /><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335" /></svg>
                <span style={{ fontSize: 13, fontWeight: 600, color: T.s700 }}>Continuar com Google</span>
              </div>

              <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 20 }}>
                <div style={{ flex: 1, height: 1, background: T.s200 }} />
                <span style={{ fontSize: 11, color: T.s400, fontWeight: 600 }}>ou com e-mail</span>
                <div style={{ flex: 1, height: 1, background: T.s200 }} />
              </div>

              {/* Inputs */}
              <div style={{ marginBottom: 12 }}>
                <div style={{ fontSize: 11, fontWeight: 700, color: T.s600, marginBottom: 6, letterSpacing: '.04em' }}>E-MAIL</div>
                <div style={{ background: '#fff', border: `1.5px solid ${focused === 'email' ? T.g500 : T.s200}`, borderRadius: 12, padding: '12px 14px', fontSize: 13, color: T.s900, transition: 'border .15s' }} onClick={() => setFocused('email')}>{email}</div>
              </div>
              <div style={{ marginBottom: 20 }}>
                <div style={{ fontSize: 11, fontWeight: 700, color: T.s600, marginBottom: 6, letterSpacing: '.04em' }}>SENHA</div>
                <div style={{ background: '#fff', border: `1.5px solid ${focused === 'pass' ? T.g500 : T.s200}`, borderRadius: 12, padding: '12px 14px', fontSize: 13, color: T.s400, transition: 'border .15s', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }} onClick={() => setFocused('pass')}>

              </div>

              <button style={{ background: T.g500, color: '#fff', border: 'none', padding: '15px', borderRadius: 13, fontSize: 15, fontWeight: 700, fontFamily: 'Inter', cursor: 'pointer', marginBottom: 14 }}>Entrar</button>

              <div style={{ textAlign: 'center', marginBottom: 20 }}>
                <span style={{ fontSize: 12, color: T.g500, fontWeight: 600 }}>Esqueceu a senha?</span>
              </div>

              <div style={{ textAlign: 'center', marginBottom: 'auto', paddingBottom: 12 }}>
                <span style={{ fontSize: 12, color: T.s400 }}>Não tem conta? </span>
                <span style={{ fontSize: 12, color: T.g500, fontWeight: 700 }}>Criar conta</span>
